<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поле чудес · Dorksense стиль</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0a0f1e;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            color: #fff;
            background-image: radial-gradient(circle at 30% 30%, rgba(255, 215, 0, 0.1) 0%, transparent 40%);
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            text-align: center;
            color: #FFD700;
            text-shadow: 0 0 10px #FFA500, 0 0 20px #FF4500;
            margin-bottom: 2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Игровой контейнер */
        .game-container {
            max-width: 1200px;
            width: 100%;
            background: #1a1f30;
            border: 6px solid #FFD700;
            border-radius: 70px;
            padding: 2.5rem;
            box-shadow: 0 0 50px gold;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2.5rem;
        }

        /* Табло слова */
        .word-board {
            background: #0a0f1e;
            border: 5px solid #FFD700;
            border-radius: 60px;
            padding: 2rem 3rem;
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 1.5rem;
            text-transform: uppercase;
            color: #FFD700;
            text-shadow: 0 0 15px orange;
            box-shadow: inset 0 0 30px rgba(255,215,0,0.3);
            word-break: break-all;
            text-align: center;
            line-height: 1.3;
        }

        /* Секция барабана */
        .wheel-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            gap: 1.5rem;
        }

        .wheel-container {
            position: relative;
            width: 400px;
            height: 400px;
            margin: 1rem 0;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                #ff4444 0deg 45deg,   /* банкрот */
                #44ff44 45deg 90deg,  /* 100 */
                #4444ff 90deg 135deg, /* 200 */
                #ffff44 135deg 180deg,/* 300 */
                #ff44ff 180deg 225deg,/* 500 */
                #44ffff 225deg 270deg,/* приз */
                #ff8844 270deg 315deg,/* пропуск */
                #8844ff 315deg 360deg /* 0 (пропуск) */
            );
            border: 8px solid #FFD700;
            box-shadow: 0 0 30px gold, inset 0 0 30px rgba(255,255,255,0.5);
            transition: transform 3s cubic-bezier(0.2, 0.9, 0.3, 1.1);
            position: relative;
            cursor: pointer;
        }

        /* стрелка-указатель */
        .wheel-pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 30px solid transparent;
            border-right: 30px solid transparent;
            border-top: 50px solid #FFD700;
            filter: drop-shadow(0 0 10px orange);
            z-index: 10;
        }

        .sector-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            font-weight: 900;
            color: white;
            text-shadow: 2px 2px 0 #000;
            background: rgba(0,0,0,0.5);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            white-space: nowrap;
        }

        .spin-button {
            background: #FFD700;
            border: none;
            border-radius: 60px;
            padding: 1.5rem 4rem;
            font-size: 2.2rem;
            font-weight: 700;
            color: #0a0f1e;
            cursor: pointer;
            box-shadow: 0 0 20px gold;
            border: 3px solid white;
            transition: 0.2s;
            text-transform: uppercase;
            margin-top: 1rem;
        }

        .spin-button:hover {
            background: #FFA500;
            transform: scale(1.05);
        }

        .spin-button:disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        /* Информация о текущем секторе */
        .current-sector {
            font-size: 2.2rem;
            background: #0a0f1e;
            border: 3px solid #FFD700;
            border-radius: 40px;
            padding: 1rem 2.5rem;
            color: #FFD700;
            box-shadow: 0 0 15px gold;
            margin: 0.5rem 0;
        }

        /* Виртуальная клавиатура */
        .keyboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem;
            margin: 1rem 0;
            max-width: 800px;
        }

        .key {
            background: #2a2f40;
            border: 3px solid #FFD700;
            border-radius: 30px;
            width: 70px;
            height: 70px;
            font-size: 2.2rem;
            font-weight: 700;
            color: #FFD700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 10px gold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .key:hover:not(:disabled) {
            background: #FFD700;
            color: #0a0f1e;
            transform: scale(1.1);
        }

        .key:disabled {
            opacity: 0.3;
            cursor: default;
            border-color: #666;
        }

        .key.used {
            opacity: 0.3;
            border-color: #666;
            background: #444;
        }

        /* Счёт */
        .score-panel {
            font-size: 2.5rem;
            color: #FFD700;
            text-shadow: 0 0 15px cyan;
            background: #0a0f1e;
            border: 3px solid #FFD700;
            border-radius: 50px;
            padding: 1rem 3rem;
        }

        /* Кнопки управления */
        .control-buttons {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 1rem;
        }

        .control-btn {
            background: #2a2f40;
            border: 4px solid #FFD700;
            border-radius: 60px;
            padding: 1.2rem 3rem;
            font-size: 1.8rem;
            font-weight: 700;
            color: #FFD700;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 15px gold;
        }

        .control-btn:hover {
            background: #FFD700;
            color: #0a0f1e;
            transform: scale(1.05);
        }

        /* Анимация вспышки при открытии буквы */
        @keyframes letterPop {
            0% { transform: scale(1); text-shadow: 0 0 5px gold; }
            50% { transform: scale(1.2); text-shadow: 0 0 20px orange, 0 0 40px red; }
            100% { transform: scale(1); text-shadow: 0 0 5px gold; }
        }

        .pop-animation {
            animation: letterPop 0.4s ease;
        }

        /* Анимация банкрота (красная вспышка) */
        @keyframes bankruptFlash {
            0% { background-color: #ff0000; }
            100% { background-color: #1a1f30; }
        }

        .bankrupt-flash {
            animation: bankruptFlash 0.5s 2;
        }

        /* Анимация для счётчика */
        @keyframes scorePulse {
            0% { text-shadow: 0 0 15px cyan; }
            50% { text-shadow: 0 0 30px lime, 0 0 60px gold; }
            100% { text-shadow: 0 0 15px cyan; }
        }

        .score-pulse {
            animation: scorePulse 0.5s;
        }

        .footer {
            margin-top: 2rem;
            color: #aaa;
            font-size: 1.2rem;
        }

        /* Адаптация */
        @media (max-width: 700px) {
            h1 { font-size: 2.5rem; }
            .game-container { padding: 1.5rem; }
            .word-board { font-size: 3rem; letter-spacing: 1rem; }
            .wheel-container { width: 280px; height: 280px; }
            .key { width: 50px; height: 50px; font-size: 1.6rem; }
            .spin-button { font-size: 1.8rem; padding: 1rem 2rem; }
        }
    </style>
</head>
<body>
    <h1>🎡 ПОЛЕ ЧУДЕС 🎡</h1>

    <div class="game-container">
        <!-- Табло слова -->
        <div class="word-board" id="wordBoard">_ _ _ _ _</div>

        <!-- Барабан -->
        <div class="wheel-section">
            <div class="wheel-container">
                <div class="wheel" id="wheel"></div>
                <div class="wheel-pointer"></div>
                <div class="sector-label" id="sectorLabel">0</div>
            </div>
            <button class="spin-button" id="spinBtn">КРУТИТЬ</button>
            <div class="current-sector" id="currentSectorDisplay">Текущий сектор: —</div>
        </div>

        <!-- Виртуальная клавиатура (буквы А-Я) -->
        <div class="keyboard" id="keyboard"></div>

        <!-- Счёт игрока -->
        <div class="score-panel" id="scoreDisplay">💰 0</div>

        <!-- Кнопки управления -->
        <div class="control-buttons">
            <button class="control-btn" id="newWordBtn">НОВОЕ СЛОВО</button>
            <button class="control-btn" id="resetGameBtn">СБРОС ИГРЫ</button>
        </div>
    </div>

    <div class="footer">👆 крути барабан, называй буквы</div>

    <script>
        (function() {
            // ---------- Список слов (для старшего поколения) ----------
            const words = [
                "КОСМОС", "РОДИНА", "БЕРЁЗКА", "ГАГАРИН", "КАЛИНКА",
                "ПОБЕДА", "СПУТНИК", "БАЯН", "ГАРМОНЬ", "САМОВАР",
                "МАТРЁШКА", "КРЕМЛЬ", "МОСКВА", "ВОЛГА", "БАЛАЛАЙКА"
            ];

            // Секторы барабана (углы от 0 до 360, каждый по 45°, 8 секторов)
            const sectors = [
                { name: "БАНКРОТ", value: "bankrupt", angle: 0 },
                { name: "100", value: 100, angle: 45 },
                { name: "200", value: 200, angle: 90 },
                { name: "300", value: 300, angle: 135 },
                { name: "500", value: 500, angle: 180 },
                { name: "ПРИЗ", value: "prize", angle: 225 },
                { name: "ПРОПУСК", value: "skip", angle: 270 },
                { name: "0", value: 0, angle: 315 }
            ];

            // DOM элементы
            const wordBoard = document.getElementById('wordBoard');
            const wheel = document.getElementById('wheel');
            const spinBtn = document.getElementById('spinBtn');
            const sectorLabel = document.getElementById('sectorLabel');
            const currentSectorDisplay = document.getElementById('currentSectorDisplay');
            const keyboardDiv = document.getElementById('keyboard');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const newWordBtn = document.getElementById('newWordBtn');
            const resetGameBtn = document.getElementById('resetGameBtn');

            // Состояние игры
            let currentWord = '';                // загаданное слово
            let guessedLetters = [];              // уже открытые буквы
            let displayedWord = '';               // слово с прочерками
            let score = 0;                         // очки
            let currentSectorValue = 0;             // значение текущего сектора (число или строка)
            let canSpin = true;                     // можно ли крутить барабан
            let canGuess = false;                    // можно ли называть букву (после кручения и если сектор не банкрот/пропуск)
            let usedLetters = [];                    // массив использованных букв (для блокировки клавиатуры)
            let wheelSpinning = false;                // флаг для анимации

            // Инициализация
            function initGame() {
                // Выбираем случайное слово из списка
                currentWord = words[Math.floor(Math.random() * words.length)];
                guessedLetters = [];
                usedLetters = [];
                updateWordDisplay();
                renderKeyboard();
                canSpin = true;
                canGuess = false;
                // Сброс сектора
                currentSectorValue = 0;
                currentSectorDisplay.textContent = 'Текущий сектор: —';
                sectorLabel.textContent = '0';
                // Визуал барабана без поворота
                wheel.style.transform = 'rotate(0deg)';
                updateScore();
            }

            // Обновление отображения слова
            function updateWordDisplay() {
                let display = '';
                for (let char of currentWord) {
                    if (guessedLetters.includes(char) || char === ' ' || char === '-') {
                        display += char + ' ';
                    } else {
                        display += '_ ';
                    }
                }
                displayedWord = display.trim();
                wordBoard.textContent = displayedWord;
                // Проверка на полное отгадывание
                if (!displayedWord.includes('_')) {
                    setTimeout(() => {
                        alert(`Поздравляем! Вы отгадали слово: ${currentWord}`);
                    }, 100);
                }
            }

            // Рендер клавиатуры (буквы А-Я, без Ё)
            function renderKeyboard() {
                const letters = 'АБВГДЕЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ'.split('');
                keyboardDiv.innerHTML = '';
                letters.forEach(letter => {
                    const btn = document.createElement('button');
                    btn.className = 'key';
                    btn.textContent = letter;
                    btn.dataset.letter = letter;
                    if (usedLetters.includes(letter)) {
                        btn.classList.add('used');
                        btn.disabled = true;
                    }
                    btn.addEventListener('click', () => handleLetterClick(letter));
                    keyboardDiv.appendChild(btn);
                });
            }

            // Обработка нажатия буквы
            function handleLetterClick(letter) {
                if (!canGuess) {
                    alert('Сначала крутите барабан!');
                    return;
                }
                if (usedLetters.includes(letter)) {
                    alert('Эта буква уже называлась');
                    return;
                }

                // Помечаем букву как использованную
                usedLetters.push(letter);
                // Обновляем клавиатуру
                document.querySelectorAll('.key').forEach(btn => {
                    if (btn.dataset.letter === letter) {
                        btn.classList.add('used');
                        btn.disabled = true;
                    }
                });

                // Проверяем, есть ли буква в слове
                if (currentWord.includes(letter)) {
                    // Открываем букву
                    guessedLetters.push(letter);
                    // Анимация для каждой открытой буквы (добавляем класс на табло)
                    wordBoard.classList.add('pop-animation');
                    setTimeout(() => wordBoard.classList.remove('pop-animation'), 500);

                    // Подсчёт очков: стоимость сектора * количество вхождений
                    let count = currentWord.split('').filter(ch => ch === letter).length;
                    let addScore = 0;
                    if (typeof currentSectorValue === 'number') {
                        addScore = currentSectorValue * count;
                        score += addScore;
                        updateScore(true); // с анимацией
                    } else {
                        // Если сектор не число (приз, банкрот и т.д.) – не начисляем очки
                        // Но буква всё равно открывается
                    }

                    updateWordDisplay();

                    // После открытия буквы можно продолжать крутить или называть букву? Обычно после верной буквы можно крутить дальше.
                    // По правилам: если угадал букву, ход продолжается (можно крутить снова). Мы просто разрешим крутить снова, но пока оставим canGuess = true? 
                    // Лучше сделать так: после верной буквы canGuess остаётся true, но игрок может либо крутить барабан ещё раз (и тогда canGuess станет false до нового вращения), либо назвать другую букву без вращения? В классике после верной буквы можно крутить снова. 
                    // Мы упростим: после любого нажатия буквы (и верной, и неверной) ход переходит. Но это не по правилам. Давайте сделаем по-честному:
                    // - Если буква угадана, игрок может крутить барабан ещё раз (canGuess сбрасывается, можно крутить).
                    // - Если буква не угадана, ход переходит (блокируем canGuess до нового вращения).
                    // У нас сейчас canGuess остаётся true после верной, но это позволит называть несколько букв подряд без вращения, что неправильно.
                    // Исправим: после каждой попытки (любой) ход должен заканчиваться, кроме случая, когда игрок угадал и хочет крутить снова.
                    // Значит, после любого нажатия буквы мы должны заблокировать canGuess и включить canSpin. Игрок должен крутить барабан для следующего хода.
                    // Но тогда он не сможет назвать вторую букву после угаданной, пока не крутанёт. В классике после угаданной буквы он имеет право крутить барабан ещё раз (или назвать букву без вращения? В шоу "Поле чудес" после угаданной буквы игрок может либо крутить барабан, либо назвать слово целиком, либо купить букву на призовые? Мы упростим: после угаданной буквы ход не заканчивается, игрок может снова крутить барабан (или назвать слово). Но называть ещё одну букву без вращения нельзя? В шоу обычно после угаданной буквы игрок может крутить барабан снова, а если буква не угадана, ход переходит. Так и сделаем:
                    // - Если буква угадана, canGuess остаётся true? Нет, тогда можно называть без вращения. Значит, надо запретить называть буквы без нового вращения. Но после угаданной буквы игрок должен иметь возможность крутить барабан (кнопка "Крутить" активна). После кручения барабана canGuess станет true. В промежутке между угадыванием и новым вращением canGuess должен быть false. Поэтому после угаданной буквы мы не меняем canGuess? Мы его оставляем false, чтобы нельзя было назвать следующую букву без вращения. Но тогда игрок должен сначала крутить барабан. Это логично: после любого действия (кручения или ответа) мы ставим canGuess = true только после успешного вращения (не банкрот и не пропуск). Таким образом:
                    // 1. Крутим барабан -> получаем сектор -> если сектор не банкрот/пропуск, canGuess = true, иначе false.
                    // 2. При нажатии буквы (если canGuess true) обрабатываем, затем ставим canGuess = false (ход окончен).
                    // 3. При угаданной букве дополнительно начисляем очки и открываем букву, но canGuess всё равно становится false, и игрок должен снова крутить барабан.
                    // Это упрощает правила, но не совсем соответствует телешоу, где после угаданной буквы игрок продолжает. Но для нашей упрощённой игры пойдёт.
                    // Однако можно сделать иначе: после верной буквы не блокировать canGuess, разрешить называть ещё буквы, но это может привести к бесконечному угадыванию без вращения. Тогда нужно ввести механизм, что после каждой верной буквы игрок может либо крутить (начислять новые очки), либо продолжать угадывать без вращения, но тогда очки за последующие буквы не начисляются? Сложно.
                    // Остановимся на простом варианте: после любой буквы (угадана или нет) ход переходит, игрок должен крутить барабан заново. Так проще и понятнее.

                    // Но чтобы сохранить азарт, можно после угаданной буквы разрешить крутить снова, но очки начисляются только за сектор перед угадыванием. В нашей схеме мы начисляем очки, затем ход заканчивается. Игрок крутит снова — получает новый сектор. Это нормально.

                    // Итак, после угадывания буквы мы делаем canGuess = false, canSpin = true (кнопка крутить активна).
                    canGuess = false;
                    canSpin = true;
                } else {
                    // Буква не угадана — ход переходит, банкрот или пропуск не влияют, просто блокируем
                    canGuess = false;
                    canSpin = true;
                    // Анимация неудачи (мигание красным)
                    wordBoard.classList.add('bankrupt-flash');
                    setTimeout(() => wordBoard.classList.remove('bankrupt-flash'), 500);
                }
                // Обновляем состояние кнопок
                updateButtonsState();
            }

            // Функция вращения барабана
            function spinWheel() {
                if (!canSpin || wheelSpinning) return;

                wheelSpinning = true;
                canSpin = false;
                canGuess = false;
                spinBtn.disabled = true;

                // Случайный угол поворота (минимум 5 полных оборотов, максимум 10)
                const spins = 5 + Math.floor(Math.random() * 5); // 5-9 оборотов
                const extraDeg = Math.random() * 360;
                const targetDeg = spins * 360 + extraDeg;
                wheel.style.transform = `rotate(${targetDeg}deg)`;

                // Через 3 секунды (время анимации) определяем сектор
                setTimeout(() => {
                    // Вычисляем угол от 0 до 360, на который повернулось колесо (без учёта полных оборотов)
                    const finalAngle = targetDeg % 360; // остаток от деления на 360
                    // Определяем сектор по углу
                    let sectorIndex = Math.floor(finalAngle / 45); // 0-7
                    // Но из-за того что сектора начинаются с 0°, нужно скорректировать: если угол между 0 и 45 - сектор 0 (банкрот), 45-90 - сектор 1 (100) и т.д.
                    // finalAngle от 0 до 360.
                    if (finalAngle >= 360) sectorIndex = 7; // на всякий случай
                    const sector = sectors[sectorIndex];

                    // Сохраняем значение сектора
                    let sectorVal = sector.value;
                    currentSectorValue = sectorVal;
                    // Обновляем отображение
                    let displayText = '';
                    if (sectorVal === 'bankrupt') displayText = 'БАНКРОТ';
                    else if (sectorVal === 'prize') displayText = 'ПРИЗ';
                    else if (sectorVal === 'skip') displayText = 'ПРОПУСК';
                    else displayText = sectorVal;

                    currentSectorDisplay.textContent = `Текущий сектор: ${displayText}`;
                    sectorLabel.textContent = displayText;

                    // Анимация сектора (вспышка)
                    wheel.classList.add('pop-animation');
                    setTimeout(() => wheel.classList.remove('pop-animation'), 500);

                    // Обработка особых секторов
                    if (sectorVal === 'bankrupt') {
                        score = 0;
                        updateScore(true);
                        // Визуальная вспышка банкрота
                        document.querySelector('.score-panel').classList.add('bankrupt-flash');
                        setTimeout(() => document.querySelector('.score-panel').classList.remove('bankrupt-flash'), 500);
                        canGuess = false;
                        canSpin = true; // можно крутить снова
                    } else if (sectorVal === 'prize') {
                        alert('🎁 ПРИЗ! Вы получаете виртуальную шоколадку!');
                        canGuess = false;
                        canSpin = true;
                    } else if (sectorVal === 'skip') {
                        canGuess = false;
                        canSpin = true;
                    } else {
                        // Числовой сектор — можно называть букву
                        canGuess = true;
                        canSpin = false; // пока не назвали букву, крутить нельзя
                    }

                    updateButtonsState();
                    wheelSpinning = false;
                }, 3000); // должно совпадать с transition
            }

            // Обновление состояния кнопок (spinBtn и клавиатуры)
            function updateButtonsState() {
                spinBtn.disabled = !canSpin || wheelSpinning;
                // Клавиатура доступна, если canGuess = true
                document.querySelectorAll('.key').forEach(btn => {
                    if (!btn.classList.contains('used')) {
                        btn.disabled = !canGuess;
                    } else {
                        btn.disabled = true;
                    }
                });
            }

            // Обновление счёта с анимацией
            function updateScore(animate = false) {
                scoreDisplay.textContent = `💰 ${score}`;
                if (animate) {
                    scoreDisplay.classList.add('score-pulse');
                    setTimeout(() => scoreDisplay.classList.remove('score-pulse'), 500);
                }
            }

            // НОВОЕ СЛОВО
            function newWord() {
                // Выбираем новое слово из списка, отличное от текущего (по желанию)
                let newWord;
                do {
                    newWord = words[Math.floor(Math.random() * words.length)];
                } while (newWord === currentWord && words.length > 1);
                currentWord = newWord;
                guessedLetters = [];
                usedLetters = [];
                updateWordDisplay();
                renderKeyboard();
                canSpin = true;
                canGuess = false;
                currentSectorValue = 0;
                currentSectorDisplay.textContent = 'Текущий сектор: —';
                sectorLabel.textContent = '0';
                wheel.style.transform = 'rotate(0deg)';
                updateButtonsState();
            }

            // Сброс игры (обнуление счёта и новое слово)
            function resetGame() {
                score = 0;
                updateScore(true);
                newWord();
            }

            // Обработчики кнопок
            spinBtn.addEventListener('click', spinWheel);
            newWordBtn.addEventListener('click', newWord);
            resetGameBtn.addEventListener('click', resetGame);

            // Старт игры
            initGame();
        })();
    </script>
</body>
</html>
