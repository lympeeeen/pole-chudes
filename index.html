<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поле чудес · Dorksense стиль</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0a0f1e;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            color: #fff;
            background-image: radial-gradient(circle at 30% 30%, rgba(255, 215, 0, 0.1) 0%, transparent 40%);
            position: relative;
            overflow-x: hidden;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            text-align: center;
            color: #FFD700;
            text-shadow: 0 0 10px #FFA500, 0 0 20px #FF4500;
            margin-bottom: 2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .game-container {
            max-width: 1300px;
            width: 100%;
            background: #1a1f30;
            border: 6px solid #FFD700;
            border-radius: 70px;
            padding: 2.5rem;
            box-shadow: 0 0 50px gold;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2.5rem;
            position: relative;
            z-index: 10;
        }

        .word-board {
            background: #0a0f1e;
            border: 5px solid #FFD700;
            border-radius: 60px;
            padding: 2rem 3rem;
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 1.5rem;
            text-transform: uppercase;
            color: #FFD700;
            text-shadow: 0 0 15px orange;
            box-shadow: inset 0 0 30px rgba(255,215,0,0.3);
            word-break: break-all;
            text-align: center;
            line-height: 1.3;
        }

        .wheel-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            gap: 1.5rem;
        }

        .wheel-container {
            position: relative;
            width: 550px;
            height: 550px;
            margin: 1rem 0;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                #ff4444 0deg 45deg,
                #44ff44 45deg 90deg,
                #4444ff 90deg 135deg,
                #ffff44 135deg 180deg,
                #ff44ff 180deg 225deg,
                #44ffff 225deg 270deg,
                #ff8844 270deg 315deg,
                #8844ff 315deg 360deg
            );
            border: 8px solid #FFD700;
            box-shadow: 0 0 30px gold, inset 0 0 30px rgba(255,255,255,0.5);
            transition: transform 3s cubic-bezier(0.2, 0.9, 0.3, 1.1);
            position: relative;
            cursor: pointer;
        }

        .sector-labels {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .sector-label {
            position: absolute;
            left: 50%;
            top: 50%;
            font-size: 2rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 2px 2px 0 #000, 0 0 10px #000;
            white-space: nowrap;
            transform-origin: 0 0;
        }

        .wheel-pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 30px solid transparent;
            border-right: 30px solid transparent;
            border-top: 50px solid #FFD700;
            filter: drop-shadow(0 0 10px orange);
            z-index: 20;
        }

        .center-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: #FFD700;
            border-radius: 50%;
            border: 4px solid white;
            z-index: 15;
            box-shadow: 0 0 20px gold;
        }

        .spin-button {
            background: #FFD700;
            border: none;
            border-radius: 60px;
            padding: 1.5rem 4rem;
            font-size: 2.2rem;
            font-weight: 700;
            color: #0a0f1e;
            cursor: pointer;
            box-shadow: 0 0 20px gold;
            border: 3px solid white;
            transition: 0.2s;
            text-transform: uppercase;
            margin-top: 1rem;
        }

        .spin-button:hover {
            background: #FFA500;
            transform: scale(1.05);
        }

        .spin-button:disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .current-sector {
            font-size: 2.2rem;
            background: #0a0f1e;
            border: 3px solid #FFD700;
            border-radius: 40px;
            padding: 1rem 2.5rem;
            color: #FFD700;
            box-shadow: 0 0 15px gold;
            margin: 0.5rem 0;
        }

        .keyboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem;
            margin: 1rem 0;
            max-width: 900px;
        }

        .key {
            background: #2a2f40;
            border: 3px solid #FFD700;
            border-radius: 30px;
            width: 75px;
            height: 75px;
            font-size: 2.4rem;
            font-weight: 700;
            color: #FFD700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 10px gold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .key:hover:not(:disabled) {
            background: #FFD700;
            color: #0a0f1e;
            transform: scale(1.1);
        }

        .key:disabled {
            opacity: 0.3;
            cursor: default;
            border-color: #666;
        }

        .key.used {
            opacity: 0.3;
            border-color: #666;
            background: #444;
        }

        .score-panel {
            font-size: 2.5rem;
            color: #FFD700;
            text-shadow: 0 0 15px cyan;
            background: #0a0f1e;
            border: 3px solid #FFD700;
            border-radius: 50px;
            padding: 1rem 3rem;
        }

        .control-buttons {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 1rem;
        }

        .control-btn {
            background: #2a2f40;
            border: 4px solid #FFD700;
            border-radius: 60px;
            padding: 1.2rem 3rem;
            font-size: 1.8rem;
            font-weight: 700;
            color: #FFD700;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 15px gold;
        }

        .control-btn:hover {
            background: #FFD700;
            color: #0a0f1e;
            transform: scale(1.05);
        }

        @keyframes pop {
            0% { transform: scale(1); text-shadow: 0 0 5px gold; }
            50% { transform: scale(1.2); text-shadow: 0 0 20px orange, 0 0 40px red; }
            100% { transform: scale(1); text-shadow: 0 0 5px gold; }
        }

        .pop-animation {
            animation: pop 0.4s ease;
        }

        @keyframes bankruptFlash {
            0% { background-color: #ff0000; }
            100% { background-color: #1a1f30; }
        }

        .bankrupt-flash {
            animation: bankruptFlash 0.5s 2;
        }

        @keyframes scorePulse {
            0% { text-shadow: 0 0 15px cyan; }
            50% { text-shadow: 0 0 30px lime, 0 0 60px gold; }
            100% { text-shadow: 0 0 15px cyan; }
        }

        .score-pulse {
            animation: scorePulse 0.5s;
        }

        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            width: 15px;
            height: 25px;
            background: #ff0;
            opacity: 0.8;
            top: -50px;
            animation: confettiFall 3s linear forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(120vh) rotate(720deg); opacity: 0; }
        }

        @media (max-width: 800px) {
            .wheel-container { width: 400px; height: 400px; }
            .word-board { font-size: 3.5rem; letter-spacing: 1rem; }
            .key { width: 60px; height: 60px; font-size: 2rem; }
        }

        @media (max-width: 600px) {
            .wheel-container { width: 300px; height: 300px; }
            .word-board { font-size: 2.5rem; letter-spacing: 0.8rem; }
        }

        .footer {
            margin-top: 2rem;
            color: #aaa;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <h1>🎡 ПОЛЕ ЧУДЕС 🎡</h1>

    <div class="confetti-container" id="confettiContainer"></div>

    <div class="game-container">
        <div class="word-board" id="wordBoard">_ _ _ _ _</div>

        <div class="wheel-section">
            <div class="wheel-container">
                <div class="wheel" id="wheel">
                    <div class="sector-labels" id="sectorLabels"></div>
                </div>
                <div class="wheel-pointer"></div>
                <div class="center-label"></div>
            </div>
            <button class="spin-button" id="spinBtn">КРУТИТЬ</button>
            <div class="current-sector" id="currentSectorDisplay">Текущий сектор: —</div>
        </div>

        <div class="keyboard" id="keyboard"></div>

        <div class="score-panel" id="scoreDisplay">💰 0</div>

        <div class="control-buttons">
            <button class="control-btn" id="newWordBtn">НОВОЕ СЛОВО</button>
            <button class="control-btn" id="resetGameBtn">СБРОС ИГРЫ</button>
        </div>
    </div>

    <div class="footer">👆 крути барабан, называй буквы</div>

    <script>
        (function() {
            const words = [
                "КОСМОС", "РОДИНА", "БЕРЁЗКА", "ГАГАРИН", "КАЛИНКА",
                "ПОБЕДА", "СПУТНИК", "БАЯН", "ГАРМОНЬ", "САМОВАР",
                "МАТРЁШКА", "КРЕМЛЬ", "МОСКВА", "ВОЛГА", "БАЛАЛАЙКА"
            ];

            const sectors = [
                { name: "БАНКРОТ", short: "Б", value: "bankrupt", angle: 0, color: "#ff4444" },
                { name: "100", short: "100", value: 100, angle: 45, color: "#44ff44" },
                { name: "200", short: "200", value: 200, angle: 90, color: "#4444ff" },
                { name: "300", short: "300", value: 300, angle: 135, color: "#ffff44" },
                { name: "500", short: "500", value: 500, angle: 180, color: "#ff44ff" },
                { name: "ПРИЗ", short: "🎁", value: "prize", angle: 225, color: "#44ffff" },
                { name: "ПРОПУСК", short: "⏭", value: "skip", angle: 270, color: "#ff8844" },
                { name: "0", short: "0", value: 0, angle: 315, color: "#8844ff" }
            ];

            const wordBoard = document.getElementById('wordBoard');
            const wheel = document.getElementById('wheel');
            const spinBtn = document.getElementById('spinBtn');
            const currentSectorDisplay = document.getElementById('currentSectorDisplay');
            const keyboardDiv = document.getElementById('keyboard');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const newWordBtn = document.getElementById('newWordBtn');
            const resetGameBtn = document.getElementById('resetGameBtn');
            const sectorLabelsDiv = document.getElementById('sectorLabels');
            const confettiContainer = document.getElementById('confettiContainer');

            let currentWord = '';
            let guessedLetters = [];
            let displayedWord = '';
            let score = 0;
            let currentSectorValue = 0;
            let canSpin = true;
            let canGuess = false;
            let usedLetters = [];
            let wheelSpinning = false;
            let totalRotation = 0; // накопленный угол поворота (только по часовой стрелке)

            // Создание меток на барабане (привязаны к колесу)
            function createSectorLabels() {
                sectorLabelsDiv.innerHTML = '';
                const radius = 210; // расстояние от центра до метки
                sectors.forEach(sector => {
                    const label = document.createElement('div');
                    label.className = 'sector-label';
                    label.textContent = sector.short;
                    const angleRad = (sector.angle + 22.5) * Math.PI / 180;
                    const x = Math.sin(angleRad) * radius;
                    const y = -Math.cos(angleRad) * radius;
                    label.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px) rotate(0deg)`;
                    sectorLabelsDiv.appendChild(label);
                });
            }
            createSectorLabels();

            function initGame() {
                currentWord = words[Math.floor(Math.random() * words.length)];
                guessedLetters = [];
                usedLetters = [];
                updateWordDisplay();
                renderKeyboard();
                canSpin = true;
                canGuess = false;
                currentSectorValue = 0;
                currentSectorDisplay.textContent = 'Текущий сектор: —';
                totalRotation = 0;
                wheel.style.transform = 'rotate(0deg)';
                updateScore();
                confettiContainer.innerHTML = '';
            }

            function updateWordDisplay() {
                let display = '';
                for (let char of currentWord) {
                    if (guessedLetters.includes(char) || char === ' ' || char === '-') {
                        display += char + ' ';
                    } else {
                        display += '_ ';
                    }
                }
                displayedWord = display.trim();
                wordBoard.textContent = displayedWord;
                if (!displayedWord.includes('_')) {
                    startConfetti();
                    setTimeout(() => {
                        alert(`Поздравляем! Вы отгадали слово: ${currentWord}`);
                    }, 100);
                }
            }

            function startConfetti() {
                for (let i = 0; i < 100; i++) {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;
                    confetti.style.width = (Math.random() * 20 + 10) + 'px';
                    confetti.style.height = (Math.random() * 30 + 20) + 'px';
                    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    confetti.style.animationDelay = (Math.random() * 0.5) + 's';
                    confettiContainer.appendChild(confetti);
                    setTimeout(() => {
                        confetti.remove();
                    }, 5000);
                }
            }

            function renderKeyboard() {
                const letters = 'АБВГДЕЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ'.split('');
                keyboardDiv.innerHTML = '';
                letters.forEach(letter => {
                    const btn = document.createElement('button');
                    btn.className = 'key';
                    btn.textContent = letter;
                    btn.dataset.letter = letter;
                    if (usedLetters.includes(letter)) {
                        btn.classList.add('used');
                        btn.disabled = true;
                    }
                    btn.addEventListener('click', () => handleLetterClick(letter));
                    keyboardDiv.appendChild(btn);
                });
                updateButtonsState();
            }

            function handleLetterClick(letter) {
                if (!canGuess) {
                    alert('Сначала крутите барабан!');
                    return;
                }
                if (usedLetters.includes(letter)) {
                    alert('Эта буква уже называлась');
                    return;
                }

                usedLetters.push(letter);
                document.querySelectorAll('.key').forEach(btn => {
                    if (btn.dataset.letter === letter) {
                        btn.classList.add('used');
                        btn.disabled = true;
                    }
                });

                if (currentWord.includes(letter)) {
                    guessedLetters.push(letter);
                    wordBoard.classList.add('pop-animation');
                    setTimeout(() => wordBoard.classList.remove('pop-animation'), 500);

                    let count = currentWord.split('').filter(ch => ch === letter).length;
                    if (typeof currentSectorValue === 'number') {
                        let addScore = currentSectorValue * count;
                        score += addScore;
                        updateScore(true);
                    }
                    updateWordDisplay();
                } else {
                    wordBoard.classList.add('bankrupt-flash');
                    setTimeout(() => wordBoard.classList.remove('bankrupt-flash'), 500);
                }

                canGuess = false;
                canSpin = true;
                updateButtonsState();
            }

            function spinWheel() {
                if (!canSpin || wheelSpinning) return;

                wheelSpinning = true;
                canSpin = false;
                canGuess = false;
                spinBtn.disabled = true;

                const spins = 5 + Math.floor(Math.random() * 5); // 5-9 полных оборотов
                const extraDeg = Math.random() * 360; // дополнительный угол
                const addRotation = spins * 360 + extraDeg;
                totalRotation += addRotation; // всегда увеличиваем, чтобы крутилось только по часовой стрелке

                wheel.style.transform = `rotate(${totalRotation}deg)`;

                setTimeout(() => {
                    const finalAngle = totalRotation % 360;
                    let sectorIndex = Math.floor(finalAngle / 45);
                    if (sectorIndex >= 8) sectorIndex = 7;
                    const sector = sectors[sectorIndex];

                    let sectorVal = sector.value;
                    currentSectorValue = sectorVal;

                    let displayText = '';
                    if (sectorVal === 'bankrupt') displayText = 'БАНКРОТ';
                    else if (sectorVal === 'prize') displayText = 'ПРИЗ';
                    else if (sectorVal === 'skip') displayText = 'ПРОПУСК';
                    else displayText = sectorVal;

                    currentSectorDisplay.textContent = `Текущий сектор: ${displayText}`;

                    wheel.classList.add('pop-animation');
                    setTimeout(() => wheel.classList.remove('pop-animation'), 500);

                    if (sectorVal === 'bankrupt') {
                        score = 0;
                        updateScore(true);
                        document.querySelector('.score-panel').classList.add('bankrupt-flash');
                        setTimeout(() => document.querySelector('.score-panel').classList.remove('bankrupt-flash'), 500);
                        canGuess = false;
                        canSpin = true;
                    } else if (sectorVal === 'prize') {
                        alert('🎁 ПРИЗ! Вы получаете виртуальную шоколадку!');
                        canGuess = false;
                        canSpin = true;
                    } else if (sectorVal === 'skip') {
                        canGuess = false;
                        canSpin = true;
                    } else {
                        canGuess = true;
                        canSpin = false;
                    }

                    updateButtonsState();
                    wheelSpinning = false;
                }, 3000);
            }

            function updateButtonsState() {
                spinBtn.disabled = !canSpin || wheelSpinning;
                document.querySelectorAll('.key').forEach(btn => {
                    if (!btn.classList.contains('used')) {
                        btn.disabled = !canGuess;
                    }
                });
            }

            function updateScore(animate = false) {
                scoreDisplay.textContent = `💰 ${score}`;
                if (animate) {
                    scoreDisplay.classList.add('score-pulse');
                    setTimeout(() => scoreDisplay.classList.remove('score-pulse'), 500);
                }
            }

            function newWord() {
                let newWord;
                do {
                    newWord = words[Math.floor(Math.random() * words.length)];
                } while (newWord === currentWord && words.length > 1);
                currentWord = newWord;
                guessedLetters = [];
                usedLetters = [];
                updateWordDisplay();
                renderKeyboard();
                canSpin = true;
                canGuess = false;
                currentSectorValue = 0;
                currentSectorDisplay.textContent = 'Текущий сектор: —';
                totalRotation = 0;
                wheel.style.transform = 'rotate(0deg)';
                updateButtonsState();
                confettiContainer.innerHTML = '';
            }

            function resetGame() {
                score = 0;
                updateScore(true);
                newWord();
            }

            spinBtn.addEventListener('click', spinWheel);
            newWordBtn.addEventListener('click', newWord);
            resetGameBtn.addEventListener('click', resetGame);

            initGame();
        })();
    </script>
</body>
</html>
